webdriver {
  driver = chrome
  base.url = "http://localhost:5173"

  timeouts {
    implicitly.wait = 5
    wait.for.timeout = 15
  }

  capabilities {
    browserName = "chrome"
    "goog:chromeOptions" {
      args = [
        "--disable-gpu",
        "--no-sandbox",
        "--disable-dev-shm-usage",
        "--window-size=1920,1080"
      ]
    }
  }
}

serenity {
  project.name = "Hotel Booking – E2E Tests"
  take.screenshots = AFTER_EACH_STEP
  reports.show.step.details = true
}

# ── Perfiles de entorno ───────────────────────────────────────────────────────
# Uso local (por defecto): las args de arriba, con ventana visible.
# Uso CI:  ./gradlew test -Denvironment=ci
#   → reemplaza goog:chromeOptions.args con el conjunto headless completo.
# ─────────────────────────────────────────────────────────────────────────────
environments {
  ci {
    webdriver {
      capabilities {
        "goog:chromeOptions" {
          args = [
            "--headless=new",
            "--disable-gpu",
            "--no-sandbox",
            "--disable-dev-shm-usage",
            "--disable-extensions",
            "--window-size=1920,1080",
            "--remote-allow-origins=*"
          ]
        }
      }
    }
  }
}
