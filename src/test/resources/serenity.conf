webdriver {
  driver = chrome
  base.url = "http://localhost:5173"

  timeouts {
    implicitly.wait = 5
    wait.for.timeout = 15
  }

  capabilities {
    browserName = "chrome"
    "goog:chromeOptions" {
      # --headless=new: requerido en CI (sin display server).
      # Para depuración local con navegador visible, comenta esta línea.
      args = [
        "--headless=new",
        "--disable-gpu",
        "--no-sandbox",
        "--disable-dev-shm-usage",
        "--disable-extensions",
        "--remote-allow-origins=*",
        "--window-size=1920,1080"
      ]
    }
  }
}

serenity {
  project.name = "Hotel Booking – E2E Tests"
  take.screenshots = AFTER_EACH_STEP
  reports.show.step.details = true
}
