webdriver {
  driver = chrome
  base.url = "http://localhost:5173"

  timeouts {
    implicitly.wait = 5
    wait.for.timeout = 15
  }

  capabilities {
    browserName = "chrome"
    "goog:chromeOptions" {
      args = [
        "--disable-gpu",
        "--no-sandbox",
        "--disable-dev-shm-usage",
        "--window-size=1920,1080"
        # Descomentar para modo headless en CI:
        # "--headless=new"
      ]
    }
  }
}

serenity {
  project.name = "Hotel Booking – E2E Tests"
  take.screenshots = AFTER_EACH_STEP
  reports.show.step.details = true
}
