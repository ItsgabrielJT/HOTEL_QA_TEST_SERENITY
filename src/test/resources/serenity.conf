webdriver {
  driver = chrome
  base.url = "http://localhost:5173"

  timeouts {
    implicitly.wait = 5
    wait.for.timeout = 30
  }

  capabilities {
    browserName = "chrome"
    "goog:chromeOptions" {
      args = [
        "--headless=new",
        "--disable-gpu",
        "--no-sandbox",
        "--disable-dev-shm-usage",
        "--remote-allow-origins=*",
        "--window-size=1920,1080"
      ]
    }
  }
}

# headless.mode garantiza que Serenity aplique --headless incluso si
# la versión no lo toma del bloque capabilities anterior.
headless.mode = true

serenity {
  project.name = "Hotel Booking – E2E Tests"
  take.screenshots = AFTER_EACH_STEP
  reports.show.step.details = true
}
